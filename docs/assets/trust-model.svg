<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" width="760" height="330"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ind" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto">
      <path d="M0,0 L7.5,3 L0,6 Z" fill="#4f46e5"/>
    </marker>
    <marker id="blu" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto">
      <path d="M0,0 L7.5,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="blustart" markerWidth="10" markerHeight="10" refX="2.5" refY="3" orient="auto">
      <path d="M7.5,0 L0,3 L7.5,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- console (authority / root of trust) -->
  <g text-anchor="middle">
    <rect x="300" y="24" width="160" height="62" rx="10" fill="#4f46e5"/>
    <text x="380" y="50" fill="#ffffff" font-size="16" font-weight="700">console</text>
    <text x="380" y="71" fill="#e0e7ff" font-size="11.5">authority &#183; root of trust</text>
  </g>

  <!-- enrollment grant arrows (dashed) console -> peers -->
  <g fill="none" stroke="#4f46e5" stroke-width="2" stroke-dasharray="6 5">
    <path d="M324,86 C260,128 170,150 116,196" marker-end="url(#ind)"/>
    <path d="M380,88 L380,196" marker-end="url(#ind)"/>
    <path d="M436,86 C500,128 590,150 644,196" marker-end="url(#ind)"/>
  </g>

  <!-- grant label -->
  <g text-anchor="middle">
    <rect x="248" y="120" width="264" height="22" rx="11" fill="#e0e7ff"/>
    <text x="380" y="135" fill="#3730a3" font-size="12.5">signs a short-lived grant (enrollment &#183; once)</text>
  </g>

  <!-- peer boxes -->
  <g text-anchor="middle" font-size="15" font-weight="600">
    <rect x="44"  y="200" width="144" height="52" rx="10" fill="#2563eb"/>
    <text x="116" y="232" fill="#ffffff">agent A</text>
    <rect x="308" y="200" width="144" height="52" rx="10" fill="#2563eb"/>
    <text x="380" y="232" fill="#ffffff">agent B</text>
    <rect x="572" y="200" width="144" height="52" rx="10" fill="#2563eb"/>
    <text x="644" y="232" fill="#ffffff">agent C</text>
  </g>

  <!-- peer-to-peer arrows (solid, bidirectional) -->
  <g fill="none" stroke="#2563eb" stroke-width="2">
    <line x1="200" y1="226" x2="296" y2="226" marker-end="url(#blu)" marker-start="url(#blustart)"/>
    <line x1="464" y1="226" x2="560" y2="226" marker-end="url(#blu)" marker-start="url(#blustart)"/>
    <path d="M180,252 C300,300 460,300 580,252" marker-end="url(#blu)" marker-start="url(#blustart)"/>
  </g>

  <!-- p2p label -->
  <g text-anchor="middle">
    <rect x="252" y="270" width="256" height="22" rx="11" fill="#dbeafe"/>
    <text x="380" y="285" fill="#1e3a8a" font-size="12.5">verify each other offline &#183; call tools</text>
  </g>

  <!-- caption -->
  <text x="380" y="320" text-anchor="middle" font-size="11.5" font-style="italic" fill="#64748b">The console originates trust, then steps aside &#8212; peers run on cached, signed credentials and verify each other directly, even offline. Root, not hub.</text>
</svg>
