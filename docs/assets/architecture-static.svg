<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="J3nna Mesh — a loosely-coupled peer-to-peer agentic and service mesh, with trust built in. The animation walks six steps of the agent lifecycle: enroll, discover, call tools, rooms, memory and secrets, and revoke. A console is the root of trust that issues grants and then steps off the hot path. Disparate specialized agents — your own agents plus the bundled roles room-agent, room-view and signal-bridge — announce a signed presence, discover each other over multicast and gossip, and cooperate peer-to-peer over the jip protocol in a shared room, bridging events outside, with no broker on the data path. Agents can embed the optional kernel for memory and seal secrets in a vault used by handle.">
  <defs>
    <linearGradient id="m-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0f1f"/><stop offset="1" stop-color="#0c1426"/></linearGradient>
    <radialGradient id="m-glow" cx="0.5" cy="0.5" r="0.6"><stop offset="0" stop-color="#1d4e6b" stop-opacity="0.34"/><stop offset="0.55" stop-color="#142a52" stop-opacity="0.15"/><stop offset="1" stop-color="#0a0f1f" stop-opacity="0"/></radialGradient>
    <linearGradient id="m-accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#818cf8"/></linearGradient>
    <radialGradient id="m-node"><stop offset="0" stop-color="#38d6f0" stop-opacity="0.40"/><stop offset="1" stop-color="#38d6f0" stop-opacity="0"/></radialGradient>
    <radialGradient id="m-you"><stop offset="0" stop-color="#5eead4" stop-opacity="0.62"/><stop offset="1" stop-color="#5eead4" stop-opacity="0"/></radialGradient>
    <radialGradient id="m-violet"><stop offset="0" stop-color="#c4b5fd" stop-opacity="0.5"/><stop offset="1" stop-color="#c4b5fd" stop-opacity="0"/></radialGradient>
    <radialGradient id="m-root"><stop offset="0" stop-color="#a5b4fc" stop-opacity="0.5"/><stop offset="1" stop-color="#a5b4fc" stop-opacity="0"/></radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="url(#m-bg)"/>
  <rect x="0" y="160" width="1200" height="600" fill="url(#m-glow)"/>

  <!-- ░ TITLE ░ -->
  <text x="600" y="42" font-size="33" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="-0.5">J3nna <tspan fill="url(#m-accent)">Mesh</tspan></text>
  <text x="600" y="65" font-size="15" font-weight="500" fill="#9fb0d0" text-anchor="middle">A loosely-coupled peer-to-peer agentic &amp; service mesh &#8212; with trust built in</text>

  <!-- ░ STEP BAR ░ -->
  <rect x="0" y="78" width="1200" height="84" fill="#0a1124"/>
  <line x1="0" y1="78" x2="1200" y2="78" stroke="#1a2747" stroke-width="1"/>
  <line x1="0" y1="162" x2="1200" y2="162" stroke="#1a2747" stroke-width="1"/>
  <g text-anchor="middle" font-size="15" font-weight="700" fill="#6f86ab">
    <text x="104" y="112"><tspan fill="#445777" font-weight="800">1</tspan>&#160; Enroll</text>
    <text x="302" y="112"><tspan fill="#445777" font-weight="800">2</tspan>&#160; Discover</text>
    <text x="500" y="112"><tspan fill="#445777" font-weight="800">3</tspan>&#160; Call tools</text>
    <text x="700" y="112"><tspan fill="#445777" font-weight="800">4</tspan>&#160; Rooms</text>
    <text x="898" y="112"><tspan fill="#445777" font-weight="800">5</tspan>&#160; Memory &amp; secrets</text>
    <text x="1096" y="112"><tspan fill="#445777" font-weight="800">6</tspan>&#160; Revoke</text>
  </g>
  <!-- subtitle slot + timed elements (grants / links / room / discovery) supplied by the animation -->

  <!-- ░ MESH CONTENT ░ -->
  <g transform="translate(0,170)">

  <!-- console -->
  <circle cx="600" cy="70" r="44" fill="url(#m-root)"/>
  <circle cx="600" cy="70" r="22" fill="#141b33" stroke="#a5b4fc" stroke-width="2.4"/>
  <circle cx="600" cy="70" r="10.5" fill="none" stroke="#a5b4fc" stroke-width="1.6"/>
  <circle cx="600" cy="70" r="2.8" fill="#c7d2fe"/>
  <text x="600" y="20" font-size="17" font-weight="800" fill="#dbe2ff" text-anchor="middle">console</text>
  <text x="600" y="38" font-size="11.5" fill="#7c89b8" text-anchor="middle">root of trust</text>
  <rect x="676" y="60" width="26" height="19" rx="3" fill="#1a1608" stroke="#eab308" stroke-opacity="0.75" stroke-width="1.4"/>
  <path d="M681 60 a8 8 0 0 1 16 0" fill="none" stroke="#eab308" stroke-opacity="0.75" stroke-width="1.3"/>
  <circle cx="689" cy="70" r="2" fill="#fde68a"/>
  <text x="689" y="95" font-size="11" font-weight="700" fill="#fde68a" text-anchor="middle">vault</text>

  <!-- optional kernel -->
  <g stroke="#2dd4bf" stroke-opacity="0.4" stroke-width="1.4" stroke-dasharray="3 4" fill="none">
    <path d="M347 238 Q250 330 232 392"/><path d="M347 362 Q280 392 252 404"/>
  </g>
  <rect x="120" y="392" width="190" height="96" rx="13" fill="#0c2420" stroke="#2dd4bf" stroke-opacity="0.55" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="215" y="416" font-size="14" font-weight="700" fill="#99f6e4" text-anchor="middle">kernel <tspan font-weight="400" font-style="italic" fill="#5b9c90">· optional</tspan></text>
  <text x="215" y="434" font-size="11.5" fill="#6f9c93" text-anchor="middle">memory &#8212; recall &#8646; remember</text>
  <g stroke="#2dd4bf" stroke-opacity="0.5" stroke-width="1.1">
    <line x1="168" y1="458" x2="200" y2="446"/><line x1="200" y1="446" x2="236" y2="460"/>
    <line x1="236" y1="460" x2="268" y2="448"/><line x1="200" y1="446" x2="215" y2="472"/><line x1="236" y1="460" x2="215" y2="472"/>
  </g>
  <g fill="#5eead4"><circle cx="168" cy="458" r="3.4"/><circle cx="200" cy="446" r="3.4"/><circle cx="236" cy="460" r="3.4"/><circle cx="268" cy="448" r="3.4"/><circle cx="215" cy="472" r="3.4"/></g>

  <!-- peers -->
  <circle cx="600" cy="150" r="34" fill="url(#m-you)"/>
  <circle cx="600" cy="150" r="17" fill="#0f2d2a" stroke="#5eead4" stroke-width="2.4"/>
  <circle cx="600" cy="150" r="8" fill="none" stroke="#99f6e4" stroke-width="1.3"/>
  <text x="600" y="154" font-size="11" font-weight="800" fill="#ccfbf1" text-anchor="middle">you</text>
  <text x="600" y="120" font-size="14" font-weight="700" fill="#bff3ec" text-anchor="middle">your agent</text>

  <circle cx="365" cy="225" r="27" fill="url(#m-node)"/>
  <circle cx="365" cy="225" r="13.5" fill="#11253a" stroke="#7dd3fc" stroke-width="2"/>
  <text x="365" y="197" font-size="13.5" font-weight="600" fill="#bfe6ff" text-anchor="middle">an agent</text>
  <text x="365" y="258" font-size="11" fill="#5f86a3" text-anchor="middle">vision</text>

  <circle cx="835" cy="225" r="27" fill="url(#m-violet)"/>
  <circle cx="835" cy="225" r="13.5" fill="#1c1a36" stroke="#c4b5fd" stroke-width="2"/>
  <text x="835" y="197" font-size="13.5" font-weight="600" fill="#ddd6fe" text-anchor="middle">an agent</text>
  <text x="835" y="258" font-size="11" fill="#8b82bf" text-anchor="middle">planner</text>

  <circle cx="365" cy="375" r="27" fill="url(#m-node)"/>
  <circle cx="365" cy="375" r="13.5" fill="#11253a" stroke="#7dd3fc" stroke-width="2"/>
  <text x="365" y="416" font-size="13.5" font-weight="600" fill="#bfe6ff" text-anchor="middle">room-view</text>
  <circle cx="324" cy="361" r="4.6" fill="#cbd5e1"/>
  <path d="M315 377 a9 9 0 0 1 18 0 z" fill="#cbd5e1"/>
  <text x="301" y="361" font-size="10.5" fill="#7c8cab" text-anchor="end">human</text>

  <circle cx="600" cy="450" r="27" fill="url(#m-node)"/>
  <circle cx="600" cy="450" r="13.5" fill="#11253a" stroke="#7dd3fc" stroke-width="2"/>
  <text x="600" y="491" font-size="13.5" font-weight="600" fill="#bfe6ff" text-anchor="middle">room-agent</text>
  <text x="600" y="507" font-size="11" font-style="italic" fill="#5f86a3" text-anchor="middle">hosts the room</text>

  <circle cx="835" cy="375" r="27" fill="url(#m-node)"/>
  <circle cx="835" cy="375" r="13.5" fill="#11253a" stroke="#7dd3fc" stroke-width="2"/>
  <text x="835" y="416" font-size="13.5" font-weight="600" fill="#bfe6ff" text-anchor="middle">signal-bridge</text>
  <rect x="868" y="365" width="25" height="18" rx="3" fill="#1a1608" stroke="#eab308" stroke-opacity="0.75" stroke-width="1.3"/>
  <path d="M873 365 a8 8 0 0 1 15 0" fill="none" stroke="#eab308" stroke-opacity="0.75" stroke-width="1.2"/>
  <circle cx="880" cy="374" r="1.8" fill="#fde68a"/>
  <text x="880" y="358" font-size="10" font-weight="700" fill="#fde68a" text-anchor="middle">vault</text>
  <path d="M862 375 L1006 375" stroke="#64748b" stroke-width="1.4" stroke-dasharray="1 5" stroke-linecap="round"/>
  <rect x="1008" y="356" width="104" height="38" rx="9" fill="#10182b" stroke="#33415c" stroke-width="1.3"/>
  <text x="1060" y="373" font-size="12" font-weight="600" fill="#9fb0cc" text-anchor="middle">external</text>
  <text x="1060" y="387" font-size="10" fill="#5f6f8c" text-anchor="middle">webhook &#8599;</text>

  <!-- thesis -->
  <text x="600" y="566" font-size="17" font-weight="700" fill="#e8f3ff" text-anchor="middle">Disparate agents find one another and cooperate directly &#8212; <tspan fill="#5eead4">no broker on the data path.</tspan></text>

  </g>

  <!-- official Go logo (go.dev/images/go-logo-blue.svg) -->
  <text x="1098" y="738" font-size="11" font-weight="500" fill="#5f6f8c" text-anchor="end">built with</text>
  <g transform="translate(1104,718) scale(0.318)" fill="#00acd7" fill-rule="evenodd" opacity="0.95">
    <path d="m16.2 24.1c-.4 0-.5-.2-.3-.5l2.1-2.7c.2-.3.7-.5 1.1-.5h35.7c.4 0 .5.3.3.6l-1.7 2.6c-.2.3-.7.6-1 .6z"/>
    <path d="m1.1 33.3c-.4 0-.5-.2-.3-.5l2.1-2.7c.2-.3.7-.5 1.1-.5h45.6c.4 0 .6.3.5.6l-.8 2.4c-.1.4-.5.6-.9.6z"/>
    <path d="m25.3 42.5c-.4 0-.5-.3-.3-.6l1.4-2.5c.2-.3.6-.6 1-.6h20c.4 0 .6.3.6.7l-.2 2.4c0 .4-.4.7-.7.7z"/>
    <g transform="translate(55)">
      <path d="m74.1 22.3c-6.3 1.6-10.6 2.8-16.8 4.4-1.5.4-1.6.5-2.9-1-1.5-1.7-2.6-2.8-4.7-3.8-6.3-3.1-12.4-2.2-18.1 1.5-6.8 4.4-10.3 10.9-10.2 19 .1 8 5.6 14.6 13.5 15.7 6.8.9 12.5-1.5 17-6.6.9-1.1 1.7-2.3 2.7-3.7-3.6 0-8.1 0-19.3 0-2.1 0-2.6-1.3-1.9-3 1.3-3.1 3.7-8.3 5.1-10.9.3-.6 1-1.6 2.5-1.6h36.4c-.2 2.7-.2 5.4-.6 8.1-1.1 7.2-3.8 13.8-8.2 19.6-7.2 9.5-16.6 15.4-28.5 17-9.8 1.3-18.9-.6-26.9-6.6-7.4-5.6-11.6-13-12.7-22.2-1.3-10.9 1.9-20.7 8.5-29.3 7.1-9.3 16.5-15.2 28-17.3 9.4-1.7 18.4-.6 26.5 4.9 5.3 3.5 9.1 8.3 11.6 14.1.6.9.2 1.4-1 1.7z"/>
      <path d="m107.2 77.6c-9.1-.2-17.4-2.8-24.4-8.8-5.9-5.1-9.6-11.6-10.8-19.3-1.8-11.3 1.3-21.3 8.1-30.2 7.3-9.6 16.1-14.6 28-16.7 10.2-1.8 19.8-.8 28.5 5.1 7.9 5.4 12.8 12.7 14.1 22.3 1.7 13.5-2.2 24.5-11.5 33.9-6.6 6.7-14.7 10.9-24 12.8-2.7.5-5.4.6-8 .9zm23.8-40.4c-.1-1.3-.1-2.3-.3-3.3-1.8-9.9-10.9-15.5-20.4-13.3-9.3 2.1-15.3 8-17.5 17.4-1.8 7.8 2 15.7 9.2 18.9 5.5 2.4 11 2.1 16.3-.6 7.9-4.1 12.2-10.5 12.7-19.1z" fill-rule="nonzero"/>
    </g>
  </g>

<g><text x="104" y="112" font-size="15" font-weight="700" fill="#e8f3ff" text-anchor="middle"><tspan fill="#5eead4" font-weight="800">1</tspan>&#160; Enroll</text>
  <line x1="74" y1="124" x2="134" y2="124" stroke="#5eead4" stroke-width="2.6" stroke-linecap="round"/>
<text x="600" y="147" font-size="18" font-weight="600" fill="#cdddf2" text-anchor="middle">Enroll once &#8212; the authority signs a grant, then steps off the path.</text></g>
<g transform="translate(0,170)">
<g opacity="1"><g stroke="#818cf8" stroke-opacity="0.26" stroke-width="1.4" stroke-dasharray="2 7" stroke-linecap="round" fill="none"><path d="M600 96 L600 148"/><path d="M600 96 L376 214"/><path d="M600 96 L824 214"/><path d="M600 96 L376 364"/><path d="M600 96 L824 364"/><path d="M600 96 L600 436"/></g></g>
<g opacity="1"><g stroke="#5eead4" stroke-opacity="0.22" stroke-width="1.6" stroke-linecap="round" fill="none"><path d="M600 150 L835 225"/><path d="M835 225 L835 375"/><path d="M835 375 L600 450"/><path d="M600 450 L365 375"/><path d="M365 375 L365 225"/><path d="M365 225 L600 150"/><path d="M600 150 L600 450"/><path d="M365 225 L835 375"/><path d="M835 225 L365 375"/></g><g fill="#7df3ff"><circle cx="717" cy="187" r="3.2"/><circle cx="835" cy="300" r="3.2"/><circle cx="717" cy="412" r="3.2"/><circle cx="482" cy="412" r="3.2"/><circle cx="365" cy="300" r="3.2"/><circle cx="482" cy="187" r="3.2"/><circle cx="600" cy="300" r="3.2"/></g></g>
<g opacity="1"><ellipse cx="600" cy="300" rx="172" ry="96" fill="#0e1c33" fill-opacity="0.5" stroke="#274063" stroke-width="1.3" stroke-dasharray="4 5"/>
  <text x="600" y="296" font-size="13.5" font-weight="600" fill="#86a0c4" text-anchor="middle">a room</text>
  <text x="600" y="314" font-size="11.5" fill="#566b8c" text-anchor="middle">shared collaboration space</text></g>
<g fill="none" stroke="#7dd3fc">
    <circle cx="150" cy="200" r="13" stroke-opacity="0.55"/><circle cx="150" cy="200" r="24" stroke-opacity="0.30"/><circle cx="150" cy="200" r="35" stroke-opacity="0.14"/></g>
  <circle cx="150" cy="200" r="4" fill="#bfe6ff"/>
  <text x="150" y="258" font-size="14" font-weight="700" fill="#bfe6ff" text-anchor="middle">discovery</text>
  <text x="150" y="277" font-size="12" fill="#6f93b0" text-anchor="middle">multicast + gossip</text>
  <text x="150" y="294" font-size="11.5" fill="#5b7a93" text-anchor="middle">peers find each other &#8212; no registry</text>
</g>
</svg>
