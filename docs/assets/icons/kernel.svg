<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56" role="img" aria-label="Kernel knowledge graph">
  <defs>
    <linearGradient id="t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="56" height="56" rx="13" fill="url(#t)"/>
  <g fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- GLYPH: central node linked to 4 outer nodes; center + one outer filled -->
    <line x1="28" y1="28" x2="28" y2="16"/>
    <line x1="28" y1="28" x2="40" y2="28"/>
    <line x1="28" y1="28" x2="28" y2="40"/>
    <line x1="28" y1="28" x2="16" y2="28"/>
    <circle cx="28" cy="28" r="3.8" fill="#ffffff"/>
    <circle cx="28" cy="16" r="3.2" fill="#ffffff"/>
    <circle cx="40" cy="28" r="3.2"/>
    <circle cx="28" cy="40" r="3.2"/>
    <circle cx="16" cy="28" r="3.2"/>
  </g>
</svg>
