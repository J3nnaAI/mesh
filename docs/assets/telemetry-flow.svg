<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto">
      <path d="M0,0 L7.5,3 L0,6 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- peer boxes (left, vertical stack) -->
  <g font-size="14" font-weight="600" text-anchor="middle">
    <rect x="28" y="28"  width="150" height="42" rx="10" fill="#2563eb"/>
    <text x="103" y="54" fill="#ffffff">console</text>
    <rect x="28" y="86"  width="150" height="42" rx="10" fill="#2563eb"/>
    <text x="103" y="112" fill="#ffffff">room-agent</text>
    <rect x="28" y="144" width="150" height="42" rx="10" fill="#2563eb"/>
    <text x="103" y="170" fill="#ffffff">agent A</text>
    <rect x="28" y="202" width="150" height="42" rx="10" fill="#2563eb"/>
    <text x="103" y="228" fill="#ffffff">agent B</text>
  </g>

  <!-- monitor box (right) -->
  <rect x="560" y="106" width="172" height="62" rx="12" fill="#16a34a"/>
  <text x="646" y="132" fill="#ffffff" text-anchor="middle" font-size="16" font-weight="700">monitor</text>
  <text x="646" y="152" fill="#ffffff" text-anchor="middle" font-size="11.5" font-weight="400">live view of the mesh</text>

  <!-- side-channel event arrows: each peer -> monitor (thin, lighter) -->
  <g fill="none" stroke="#86efac" stroke-width="1.4" stroke-dasharray="5 4">
    <path d="M178,49  C360,49  400,128 552,131" marker-end="url(#ag)"/>
    <path d="M178,107 C360,107 410,134 552,135" marker-end="url(#ag)"/>
    <path d="M178,165 C360,165 410,142 552,141" marker-end="url(#ag)"/>
    <path d="M178,223 C360,223 400,148 552,145" marker-end="url(#ag)"/>
  </g>

  <!-- shared event label -->
  <g text-anchor="middle">
    <rect x="248" y="98" width="270" height="22" rx="11" fill="#dbeafe"/>
    <text x="383" y="113" fill="#1e3a8a" font-size="12">event per touch &#183; call &#183; room &#183; admit &#183; grant (W3C trace)</text>
  </g>

  <!-- opt-in note near the arrows -->
  <text x="383" y="138" text-anchor="middle" font-size="11.5" font-style="italic" fill="#16a34a">opt-in: JIP_TELEMETRY_URL &#183; zero-cost when off</text>

  <!-- caption -->
  <text x="380" y="278" text-anchor="middle" font-size="11.5" font-style="italic" fill="#475569">Each peer emits one event per touch to a collector; the monitor renders the live mesh.</text>
  <text x="380" y="293" text-anchor="middle" font-size="11.5" font-style="italic" fill="#475569">A side-channel, off the data path &#8212; one env var to turn on, nothing when off.</text>
</svg>
