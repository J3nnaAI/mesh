# J3nna Mesh — signal-bridge (events hub + HMAC-signed inbound/outbound webhooks).
#
# Mirrors the tested single-instance Docker topology (deploy/docker/compose.yaml).
# Verified on MicroK8s v1.35.3 (single instance per role); CI does not run a cluster, so validate against your own.
# replicas:1 is intentional — single instance per role for this release (see ../../docs/DEPLOYMENT.md).
#
# SINGLE active instance: the event log is in-memory and per-instance. Two replicas == two
# divergent buses (a poll cursor on one knows nothing of signals on the other). A shared event
# store to scale this horizontally is ROADMAP. The peer identity is a persisted ed25519 keypair
# on the PVC — another replica would be a DISTINCT peer needing its own grant. Hence StatefulSet.
#
# Two listeners:
#   - mesh peer port 8483 (SIGNAL_LISTEN / SIGNAL_ADVERTISE) — has NO /healthz.
#   - management/webhooks HTTP port 8484 (SIGNAL_HTTP) — serves /healthz, /hook/<id>, /webhooks.
# Probes target /healthz on 8484, NOT the mesh port.
#
# HONESTY: /webhooks CRUD is loopback-gated in code — it returns 401 over a Service. Over the
# 8484 Service you get /healthz and the HMAC-gated inbound /hook/<id>. Managing subscriptions
# is done via `kubectl exec`/port-forward to loopback inside the pod. See DEPLOYMENT.md.
---
# Headless Service — stable mesh DNS name "signal-bridge" used as the ADVERTISE address.
apiVersion: v1
kind: Service
metadata:
  name: signal-bridge
  namespace: j3nna-mesh
  labels: { app.kubernetes.io/name: signal-bridge, app.kubernetes.io/part-of: j3nna-mesh }
spec:
  clusterIP: None
  selector: { app.kubernetes.io/name: signal-bridge }
  ports:
    - { name: mesh, port: 8483, targetPort: 8483 }
---
# Management / webhooks Service — the routable name for /healthz and inbound /hook/<id>: 8484.
apiVersion: v1
kind: Service
metadata:
  name: signal-bridge-mgmt
  namespace: j3nna-mesh
  labels: { app.kubernetes.io/name: signal-bridge, app.kubernetes.io/part-of: j3nna-mesh }
spec:
  selector: { app.kubernetes.io/name: signal-bridge }
  ports:
    - { name: mgmt, port: 8484, targetPort: 8484 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: signal-bridge
  namespace: j3nna-mesh
  labels: { app.kubernetes.io/name: signal-bridge, app.kubernetes.io/part-of: j3nna-mesh }
spec:
  serviceName: signal-bridge
  replicas: 1            # single active bus — see DEPLOYMENT.md scaling model
  selector:
    matchLabels: { app.kubernetes.io/name: signal-bridge }
  template:
    metadata:
      labels: { app.kubernetes.io/name: signal-bridge }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: signal-bridge
          # BUILD AND PUSH YOUR OWN — no published image is claimed. Build with:
          #   docker build -f deploy/docker/Dockerfile --build-arg MODULE=signal-bridge \
          #     -t ghcr.io/j3nnaai/mesh-signal-bridge:0.1.0 . && docker push ghcr.io/j3nnaai/mesh-signal-bridge:0.1.0
          image: ghcr.io/j3nnaai/mesh-signal-bridge:0.1.0   # placeholder ref — replace with your registry/tag
          imagePullPolicy: IfNotPresent
          ports:
            - { name: mesh, containerPort: 8483 }
            - { name: mgmt, containerPort: 8484 }
          env:
            - { name: SIGNAL_CONSOLE, value: "http://console:8455" }
            - { name: SIGNAL_LISTEN, value: "0.0.0.0:8483" }
            - { name: SIGNAL_ADVERTISE, value: "http://signal-bridge:8483" }    # Service DNS — NEVER 127.0.0.1
            - { name: SIGNAL_HTTP, value: "0.0.0.0:8484" }
            - { name: SIGNAL_DISCOVER, value: "false" }
            - { name: SIGNAL_SEEDS, value: "http://room-agent:8482" }           # bootstrap off the room host
            - { name: SIGNAL_VAULT, value: "/data/signal-vault.enc" }           # PVC, not /tmp — subs survive restart
            - { name: SIGNAL_IDENTITY, value: "/data/signal-bridge.id" }
            - name: SIGNAL_VAULT_PASSPHRASE
              valueFrom: { secretKeyRef: { name: signal-bridge-secrets, key: vault-passphrase } }
          volumeMounts:
            - { name: data, mountPath: /data }
          # signal-bridge self-enrolls and BLOCKS until approved. The mgmt HTTP server (8484, with
          # /healthz) comes up immediately, but the peer is not usable until enrolled+approved, so size
          # the startupProbe generously to cover manual approval; it gates the livenessProbe.
          startupProbe:
            httpGet: { path: /healthz, port: 8484 }
            periodSeconds: 30
            failureThreshold: 30      # ~15 min for enroll + approval
          livenessProbe:
            httpGet: { path: /healthz, port: 8484 }
            periodSeconds: 20
            failureThreshold: 3
      volumes: []
  volumeClaimTemplates:
    - metadata:
        name: data            # /data — identity + the encrypted webhook-subscription vault
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 256Mi
---
# Placeholder Secret. REPLACE BEFORE USE — create the real one out-of-band, e.g.
#   kubectl -n j3nna-mesh create secret generic signal-bridge-secrets \
#     --from-literal=vault-passphrase='<a-strong-passphrase>'
apiVersion: v1
kind: Secret
metadata:
  name: signal-bridge-secrets
  namespace: j3nna-mesh
type: Opaque
stringData:
  vault-passphrase: "REPLACE-ME-signal-vault-passphrase"
