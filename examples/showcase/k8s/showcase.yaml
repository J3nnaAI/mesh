metadata: { name: dispatch, namespace: j3nna-showcase }
spec:
  serviceName: dispatch
  replicas: 1
  selector: { matchLabels: { app: dispatch } }
  template:
    metadata: { labels: { app: dispatch } }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 65532, fsGroup: 65532 }
      containers:
        - name: dispatch
          image: mesh-showcase:dev
          imagePullPolicy: IfNotPresent
          command: ["/app/dispatch-svc"]
          ports: [{ containerPort: 8492 }]
          env:
            - { name: DISPATCH_CONSOLE, value: "http://console:8455" }
            - { name: DISPATCH_SEEDS, value: "http://signal-bridge:8483" }
            - { name: DISPATCH_ADVERTISE, value: "http://dispatch:8492" }
            - { name: DISPATCH_LISTEN, value: "0.0.0.0:8492" }
            - { name: DISPATCH_DISCOVER, value: "false" }
            - { name: DISPATCH_VAULT, value: "/data/dispatch-vault.enc" }
            - { name: DISPATCH_VAULT_PASSPHRASE, value: "demo-dispatch-passphrase" }
            - { name: DISPATCH_IDENTITY, value: "/data/dispatch.id" }
          volumeMounts: [{ name: data, mountPath: /data }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: ["ReadWriteOnce"], resources: { requests: { storage: 256Mi } } }
